<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Совместный редактор</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 30px;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        h1 { font-size: 24px; color: #1e293b; }
        .subtitle { color: #64748b; font-size: 14px; margin-top: -8px; }
        .status {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            background: #e2e8f0;
            color: #475569;
            align-self: flex-start;
        }
        .status.connected { background: #dcfce7; color: #166534; }
        .status.error { background: #fee2e2; color: #991b1b; }
        textarea {
            width: 100%;
            height: 400px;
            padding: 16px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 15px;
            line-height: 1.6;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .clear-btn {
            background: none;
            border: 1px solid #e2e8f0;
            color: #64748b;
            padding: 6px 16px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
        }
        .clear-btn:hover { background: #f1f5f9; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Совместный редактор</h1>
    <p class="subtitle">Все изменения добавляются в общий текст через WebSocket</p>
    <div id="status" class="status">⏳ Подключение...</div>
    <textarea id="editor" placeholder="Начните писать... (Ctrl+Enter для отправки)"></textarea>
    <div class="toolbar">
        <button id="sendBtn">📤 Отправить</button>
        <button class="clear-btn" id="clearBtn">Очистить поле (локально)</button>
    </div>
</div>

<script>
    (function() {
        const editor = document.getElementById('editor');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusEl = document.getElementById('status');

        let ws = null;
        let isConnected = false;
        let reconnectTimeout = null;

        function logToConsole(msg) {
            console.log('[WS]', msg);
        }

        function connectWebSocket() {
            if (reconnectTimeout) {
                clearTimeout(reconnectTimeout);
                reconnectTimeout = null;
            }

            if (ws) {
                try {
                    ws.close();
                } catch (e) {}
                ws = null;
            }

            const wsUrl = 'ws://localhost:8080/ws';
            logToConsole('Попытка подключения к ' + wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                logToConsole('Соединение открыто');
                isConnected = true;
                statusEl.textContent = '✅ Подключено';
                statusEl.className = 'status connected';
                sendBtn.disabled = false;
            };

            ws.onmessage = function(event) {
                let rawData = event.data;
                if (rawData instanceof Blob) {
                    rawData.text().then(text => processMessage(text));
                    return;
                }
                processMessage(rawData);
            };

            function processMessage(text) {
                logToConsole('Получено сообщение: ' + text);
                try {
                    const parsed = JSON.parse(text);
                    const msg = parsed.message || '';
                    if (msg) {
                        const current = editor.value;
                        editor.value = current ? current + '\n' + msg : msg;
                        editor.scrollTop = editor.scrollHeight;
                    }
                } catch (e) {
                    console.warn('Не удалось разобрать JSON:', text);
                }
            }

            ws.onerror = function(error) {
                console.error('Ошибка WebSocket:', error);
                logToConsole('Произошла ошибка');
                statusEl.textContent = '❌ Ошибка';
                statusEl.className = 'status error';
                sendBtn.disabled = true;
            };

            ws.onclose = function(event) {
                logToConsole('Соединение закрыто. Код: ' + event.code + ', причина: ' + event.reason + ', wasClean: ' + event.wasClean);
                isConnected = false;
                statusEl.textContent = '🔴 Отключено (код ' + event.code + ')';
                statusEl.className = 'status';
                sendBtn.disabled = true;
                reconnectTimeout = setTimeout(connectWebSocket, 3000);
            };
        }

        function sendText() {
            const text = editor.value.trim();
            if (!text) {
                alert('Поле ввода пустое.');
                return;
            }
            if (!isConnected) {
                alert('Нет соединения с сервером.');
                return;
            }
            try {
                ws.send(JSON.stringify({ message: text }));
                logToConsole('Отправлено сообщение: ' + text.substring(0, 50) + '...');
            } catch (e) {
                alert('Ошибка отправки: ' + e.message);
            }
        }

        sendBtn.addEventListener('click', sendText);
        editor.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                sendText();
            }
        });
        clearBtn.addEventListener('click', function() {
            editor.value = '';
            editor.focus();
        });

        connectWebSocket();
        editor.focus();

        window.addEventListener('beforeunload', function() {
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }
        });
    })();
</script>
</body>
</html>
